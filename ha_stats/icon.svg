<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" width="256" height="256">
<title>HA Stats Lake logo</title>
<defs>
  <clipPath id="clip">
    <rect width="256" height="256" rx="42"/>
  </clipPath>
</defs>

<rect width="256" height="256" rx="42" fill="#0d1b3e"/>

<g clip-path="url(#clip)">

  <!-- Lake waves -->
  <ellipse cx="128" cy="212" rx="148" ry="48" fill="#0a2a5e" opacity="0.7"/>
  <ellipse cx="128" cy="226" rx="148" ry="48" fill="#0c3272" opacity="0.6"/>
  <ellipse cx="128" cy="242" rx="148" ry="48" fill="#0e3d8a" opacity="0.5"/>
  <path d="M-10 195 Q38 182 86 192 Q134 202 182 188 Q220 178 266 192 L266 260 L-10 260 Z" fill="#122f6e" opacity="0.55"/>
  <path d="M-10 210 Q50 197 100 208 Q150 219 200 205 Q230 198 266 208 L266 260 L-10 260 Z" fill="#163a85" opacity="0.45"/>

  <!-- Bar chart -->
  <rect x="44" y="152" width="34" height="52" rx="5" fill="#2979c4"/>
  <rect x="90" y="118" width="34" height="86" rx="5" fill="#1a6bb5"/>
  <rect x="136" y="84" width="34" height="120" rx="5" fill="#1258a0"/>
  <rect x="182" y="100" width="34" height="104" rx="5" fill="#0e4a8c"/>

