  <polyline points="61,150 107,116 153,82 199,98" fill="none" stroke="#7ec8f0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="61" cy="150" r="6" fill="#b3e5fc"/>
  <circle cx="107" cy="116" r="6" fill="#b3e5fc"/>
  <circle cx="153" cy="82" r="6" fill="#ffffff"/>
  <circle cx="199" cy="98" r="6" fill="#b3e5fc"/>
  <circle cx="153" cy="82" r="10" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>

