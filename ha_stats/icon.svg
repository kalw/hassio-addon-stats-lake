  <line x1="210" y1="28" x2="210" y2="22" stroke="#7ec8f0" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="210" y1="28" x2="214" y2="31" stroke="#7ec8f0" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>

