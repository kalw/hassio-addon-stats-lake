  <rect x="26" y="28" width="82" height="28" rx="6" fill="#0a2247"/>
  <line x1="36" y1="42" x2="98" y2="42" stroke="#1a4a8a" stroke-width="1" stroke-linecap="round"/>
  <circle cx="36" cy="42" r="3" fill="#2979c4"/>
  <circle cx="55" cy="42" r="3" fill="#2979c4"/>
  <circle cx="74" cy="42" r="3" fill="#2979c4"/>
  <circle cx="93" cy="42" r="3" fill="#2979c4"/>
  <line x1="36" y1="36" x2="36" y2="40" stroke="#1a4a8a" stroke-width="1"/>
  <line x1="55" y1="36" x2="55" y2="40" stroke="#1a4a8a" stroke-width="1"/>
  <line x1="74" y1="36" x2="74" y2="40" stroke="#1a4a8a" stroke-width="1"/>
  <line x1="93" y1="36" x2="93" y2="40" stroke="#1a4a8a" stroke-width="1"/>

  <!-- Database cylinder (storage icon) -->
  <ellipse cx="210" cy="42" rx="28" ry="7" fill="#0f2d5e" stroke="#2167a8" stroke-width="1.5"/>
  <rect x="182" y="42" width="56" height="28" fill="#0f2d5e"/>
  <rect x="183" y="42" width="54" height="28" fill="#0c2550"/>
  <ellipse cx="210" cy="70" rx="28" ry="7" fill="#0f2d5e" stroke="#2167a8" stroke-width="1.5"/>
  <ellipse cx="210" cy="56" rx="28" ry="7" fill="#112d5c" stroke="#1a5a9e" stroke-width="1"/>
  <ellipse cx="210" cy="42" rx="28" ry="7" fill="#1a3f7a" stroke="#2979c4" stroke-width="1.5"/>
  <rect x="183" y="28" width="54" height="14" fill="#122050"/>
  <ellipse cx="210" cy="28" rx="28" ry="7" fill="#1e4a8a" stroke="#2979c4" stroke-width="1.5"/>

  <!-- Clock face on top of cylinder -->
