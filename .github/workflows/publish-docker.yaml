name: Publish Docker image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v0.2.0)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          RAW="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ha_stats
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: |
            ghcr.io/kalw/ha-stats-lake/ha-stats:${{ steps.meta.outputs.version }}
            ghcr.io/kalw/ha-stats-lake/ha-stats:latest

      - name: Dispatch hassio-addons repository update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: kalw/hassio-addons
          event-type: update
          client-payload: '{"app": "ha_stats_lake"}'
